name: release-dry-run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    name: Build NuGet package artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        run: |
          choco install zig -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux cross-build tools
        run: |
          cargo install cargo-zigbuild
          rustup target add x86_64-unknown-linux-gnu

      - name: Restore package project
        run: dotnet restore src/ParquetRsForDotnet.csproj

      - name: Pack package
        run: dotnet pack src/ParquetRsForDotnet.csproj -c Release -p:CrossBuildLinux=true --no-restore

      - name: Validate package contents
        shell: pwsh
        run: |
          $package = Get-ChildItem src/bin/Release -Filter "ParquetRsForDotnet.*.nupkg" | Select-Object -First 1
          if ($null -eq $package) {
              throw "NuGet package was not produced."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $entries = [IO.Compression.ZipFile]::OpenRead($package.FullName).Entries | Select-Object -ExpandProperty FullName
          $expected = @(
              "README.md",
              "api/public-api.md",
              "api/semantic-index.json",
              "docs/ai/bootstrap.md",
              "lib/net8.0/ParquetRsForDotnet.dll",
              "lib/netstandard2.0/ParquetRsForDotnet.dll",
              "runtimes/win-x64/native/parquet_rs_for_dotnet.dll",
              "runtimes/linux-x64/native/libparquet_rs_for_dotnet.so"
          )

          foreach ($entry in $expected) {
              if ($entries -notcontains $entry) {
                  throw "Missing expected package entry: $entry"
              }
          }

          $entries | Sort-Object

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            src/bin/Release/*.nupkg
            src/bin/Release/*.snupkg
